<!doctype html>
<html class="dark" lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>OBSIDIAN_CORE // SEMICON_MONITOR</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#9ecaff",
              background: "#131313",
              "surface-container": "#201f1f",
              error: "#ffb4ab",
              outline: "#89919d",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
      }
      .blink-anomaly {
        animation: blink 0.5s infinite alternate;
      }
      @keyframes blink {
        from {
          opacity: 1;
        }
        to {
          opacity: 0.4;
        }
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body class="bg-background text-[#e5e2e1] overflow-hidden">
    <header
      class="flex justify-between items-center px-6 h-16 w-full fixed top-0 z-50 bg-[#131313] border-b border-white/10"
    >
      <div class="text-xl font-bold text-[#9ecaff] tracking-widest uppercase">
        OBSIDIAN_CORE
      </div>
      <div class="flex items-center gap-6">
        <div
          class="flex items-center gap-2 px-3 py-1 bg-[#1c1b1b] border border-white/10"
          id="latencyDisplay"
        >
          <span class="material-symbols-outlined text-[14px] text-primary"
            >sensors</span
          >
          <span class="text-[10px] text-outline uppercase">LATENCY</span>
          <span class="font-bold text-primary text-sm">-ms</span>
        </div>
      </div>
    </header>

    <div class="flex h-screen pt-16">
      <aside
        class="fixed left-0 top-16 h-[calc(100vh-64px)] w-64 bg-[#1c1b1b] border-r border-white/10 flex flex-col z-40"
        id="sidebar"
      >
        <div class="p-4 border-b border-white/10 flex items-center gap-3">
          <button
            id="backBtn"
            class="material-symbols-outlined hover:text-primary"
          >
            arrow_back
          </button>
          <div class="flex flex-col">
            <span class="text-[10px] text-outline uppercase" id="breadcrumb"
              >MODULE_ROOT</span
            >
          </div>
        </div>
        <div class="flex-1 overflow-y-auto" id="moduleList"></div>
      </aside>

      <main
        class="ml-64 flex-1 flex flex-col bg-background p-6 space-y-6 overflow-hidden"
      >
        <section id="currentSensor">
          <h2 class="text-2xl font-bold uppercase">-</h2>
          <div id="sensorInfo" class="grid grid-cols-4 gap-4 mt-4">
            <div class="bg-[#201f1f] p-4 border-l-4 border-primary">
              <div class="text-[10px] text-outline uppercase">VALUE</div>
              <div class="text-2xl font-bold mt-1" id="currentValue">-</div>
            </div>
            <div class="bg-[#201f1f] p-4 border-l-4 border-outline">
              <div class="text-[10px] text-outline uppercase">AVG</div>
              <div class="text-2xl font-bold mt-1" id="currentAvg">-</div>
            </div>
            <div class="bg-[#201f1f] p-4 border-l-4 border-primary">
              <div class="text-[10px] text-outline uppercase">STATUS</div>
              <div class="text-xl font-bold mt-1" id="currentStatus">-</div>
            </div>
          </div>
        </section>

        <section
          class="flex-1 bg-[#1c1b1b] border border-white/10 p-4 relative min-h-0"
        >
          <canvas id="chartCanvas"></canvas>
        </section>

        <section
          class="h-48 bg-[#1c1b1b] border-t border-white/10 overflow-hidden flex flex-col"
          id="alerts"
        >
          <div
            class="px-4 py-2 bg-[#2a2a2a] text-[10px] font-bold text-outline uppercase border-b border-white/10"
          >
            EVENT_LOG
          </div>
          <div
            class="flex-1 overflow-y-auto p-4 space-y-2 font-mono text-xs"
          ></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
